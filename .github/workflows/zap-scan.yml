name: ZAP Scan
on:
  workflow_dispatch:

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Scan the application
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          ref: feature/zapscanner

      - name: ZAP Scan CCD Unsecure
        uses: zaproxy/action-api-scan@v0.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          format: "soap"
          docker_name: "owasp/zap2docker-stable"
          issue_title: "ZAP Scanner for CCD Unsecure"
          target: "https://jag-ccd-1-1-52e74e-dev.apps.silver.devops.gov.bc.ca/ws/CCD.Source.DevUtil.ws:DevUtils?WSDL"       
          cmd_options: '-z "-configFile /zap/wrk/options.prop"'
