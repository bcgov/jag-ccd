name: ZAP Scan
on:
  workflow_dispatch:

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Scan the application
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          ref: feature/zapscanner

      - name: ZAP Scan for CCD Unsecure
        uses: zaproxy/action-api-scan@v0.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue_title: 'ZAP Scanner Report for CCD Unsecure'
          target: 'https://jag-ccd-1-1-52e74e-dev.apps.silver.devops.gov.bc.ca/ws'        
          cmd_options: '-z /zap/wrk/options.prop'
